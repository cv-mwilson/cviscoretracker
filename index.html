<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CVIS Core Tracker — Login</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=Syne:wght@600;700;800&family=DM+Sans:wght@400;500&display=swap" rel="stylesheet">
<style>
:root {
  --bg:      #0f1923;
  --surface: #162130;
  --card:    #1c2d3f;
  --border:  rgba(255,255,255,0.08);
  --accent:  #00d4aa;
  --accent2: #3b82f6;
  --danger:  #ef4444;
  --text:    #f0f4f8;
  --muted:   #7a9bb5;
  --mono:    'DM Mono', monospace;
  --head:    'Syne', sans-serif;
  --body:    'DM Sans', sans-serif;
  --r:       12px;
}

* { box-sizing: border-box; margin: 0; padding: 0; }

body {
  background: var(--bg);
  color: var(--text);
  font-family: var(--body);
  min-height: 100vh;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  position: relative;
  overflow: hidden;
}

/* Background grid */
body::before {
  content: '';
  position: fixed;
  inset: 0;
  background-image:
    linear-gradient(rgba(0,212,170,0.04) 1px, transparent 1px),
    linear-gradient(90deg, rgba(0,212,170,0.04) 1px, transparent 1px);
  background-size: 40px 40px;
  pointer-events: none;
}

/* Glow orb */
body::after {
  content: '';
  position: fixed;
  top: -200px;
  left: 50%;
  transform: translateX(-50%);
  width: 600px;
  height: 600px;
  background: radial-gradient(circle, rgba(0,212,170,0.08) 0%, transparent 70%);
  pointer-events: none;
}

/* Top bar */
.topbar {
  position: fixed;
  top: 0; left: 0; right: 0;
  height: 52px;
  background: rgba(22,33,48,0.95);
  border-bottom: 1px solid var(--border);
  display: flex;
  align-items: center;
  padding: 0 24px;
  backdrop-filter: blur(16px);
  z-index: 10;
}

.logo {
  font-family: var(--head);
  font-size: 18px;
  font-weight: 800;
  letter-spacing: -0.02em;
}

.logo span { color: var(--accent); }

.logo-badge {
  font-family: var(--mono);
  font-size: 9px;
  letter-spacing: 0.1em;
  color: var(--muted);
  text-transform: uppercase;
  margin-left: 10px;
  padding: 2px 7px;
  border: 1px solid var(--border);
  border-radius: 4px;
}

/* Login card */
.card {
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: 16px;
  padding: 48px 44px;
  width: 100%;
  max-width: 420px;
  position: relative;
  z-index: 1;
  animation: fadeUp 0.5s ease both;
}

.card::before {
  content: '';
  position: absolute;
  top: 0; left: 0; right: 0;
  height: 2px;
  background: linear-gradient(90deg, var(--accent), var(--accent2));
  border-radius: 16px 16px 0 0;
}

@keyframes fadeUp {
  from { opacity: 0; transform: translateY(20px); }
  to   { opacity: 1; transform: translateY(0); }
}

.card-icon {
  width: 52px;
  height: 52px;
  background: rgba(0,212,170,0.1);
  border: 1px solid rgba(0,212,170,0.2);
  border-radius: var(--r);
  display: flex;
  align-items: center;
  justify-content: center;
  margin-bottom: 24px;
}

.card-icon svg {
  width: 24px;
  height: 24px;
  stroke: var(--accent);
  fill: none;
  stroke-width: 1.8;
  stroke-linecap: round;
  stroke-linejoin: round;
}

.card-title {
  font-family: var(--head);
  font-size: 24px;
  font-weight: 800;
  letter-spacing: -0.02em;
  margin-bottom: 6px;
}

.card-sub {
  font-size: 13px;
  color: var(--muted);
  margin-bottom: 32px;
}

label {
  display: block;
  font-family: var(--mono);
  font-size: 10px;
  letter-spacing: 0.1em;
  text-transform: uppercase;
  color: var(--muted);
  margin-bottom: 8px;
}

.input-wrap {
  position: relative;
  margin-bottom: 24px;
}

input[type="password"],
input[type="text"] {
  width: 100%;
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--r);
  color: var(--text);
  font-family: var(--mono);
  font-size: 14px;
  padding: 13px 44px 13px 16px;
  outline: none;
  transition: border-color 0.2s;
  letter-spacing: 0.05em;
}

input:focus {
  border-color: var(--accent);
}

.toggle-pw {
  position: absolute;
  right: 14px;
  top: 50%;
  transform: translateY(-50%);
  background: none;
  border: none;
  cursor: pointer;
  padding: 4px;
  color: var(--muted);
  display: flex;
  align-items: center;
  transition: color 0.2s;
}

.toggle-pw:hover { color: var(--text); }

.toggle-pw svg {
  width: 18px;
  height: 18px;
  stroke: currentColor;
  fill: none;
  stroke-width: 1.8;
  stroke-linecap: round;
  stroke-linejoin: round;
}

.btn {
  width: 100%;
  background: var(--accent);
  color: #0f1923;
  font-family: var(--head);
  font-size: 15px;
  font-weight: 700;
  border: none;
  border-radius: var(--r);
  padding: 14px;
  cursor: pointer;
  transition: opacity 0.2s, transform 0.1s;
  letter-spacing: 0.01em;
}

.btn:hover { opacity: 0.9; }
.btn:active { transform: scale(0.98); }

.error {
  display: none;
  align-items: center;
  gap: 8px;
  background: rgba(239,68,68,0.1);
  border: 1px solid rgba(239,68,68,0.25);
  border-radius: var(--rs);
  padding: 10px 14px;
  font-size: 13px;
  color: #f87171;
  margin-bottom: 20px;
  animation: shake 0.3s ease;
}

.error.show { display: flex; }

@keyframes shake {
  0%,100% { transform: translateX(0); }
  25%      { transform: translateX(-6px); }
  75%      { transform: translateX(6px); }
}

.error svg {
  width: 16px;
  height: 16px;
  stroke: currentColor;
  fill: none;
  stroke-width: 2;
  stroke-linecap: round;
  flex-shrink: 0;
}

.footer-note {
  margin-top: 24px;
  text-align: center;
  font-size: 11px;
  color: var(--muted);
  font-family: var(--mono);
}
</style>
</head>
<body>

<div class="topbar">
  <div class="logo">CVIS <span>Core</span> Tracker</div>
  <div class="logo-badge">Secure Access</div>
</div>

<div class="card">
  <div class="card-icon">
    <svg viewBox="0 0 24 24"><rect x="3" y="11" width="18" height="11" rx="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg>
  </div>
  <div class="card-title">Welcome back</div>
  <div class="card-sub">Enter your password to access the Core Tracker</div>

  <div class="error" id="err">
    <svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg>
    Incorrect password. Please try again.
  </div>

  <label for="pw">Password</label>
  <div class="input-wrap">
    <input type="password" id="pw" placeholder="Enter password" autocomplete="current-password" onkeydown="if(event.key==='Enter')login()">
    <button class="toggle-pw" onclick="togglePw()" type="button" aria-label="Toggle password visibility">
      <svg id="eye-icon" viewBox="0 0 24 24"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
    </button>
  </div>

  <button class="btn" onclick="login()">Access Tracker</button>

  <div class="footer-note">Cardinal Valley Industrial Supply · Internal Use Only</div>
</div>

<script>
  const PASS = 'corescorescores123';
  const DEST = 'desktop.html';

  function login() {
    const val = document.getElementById('pw').value;
    const err = document.getElementById('err');
    if (val === PASS) {
      sessionStorage.setItem('cvis_auth', '1');
      window.location.href = DEST;
    } else {
      err.classList.remove('show');
      void err.offsetWidth; // restart animation
      err.classList.add('show');
      document.getElementById('pw').value = '';
      document.getElementById('pw').focus();
    }
  }

  function togglePw() {
    const input = document.getElementById('pw');
    const icon = document.getElementById('eye-icon');
    if (input.type === 'password') {
      input.type = 'text';
      icon.innerHTML = '<path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94"/><path d="M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19"/><line x1="1" y1="1" x2="23" y2="23"/>';
    } else {
      input.type = 'password';
      icon.innerHTML = '<path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/>';
    }
  }
</script>
</body>
</html>
